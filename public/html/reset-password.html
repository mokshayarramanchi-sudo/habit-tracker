<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Reset Password · Daily Habit Tracker</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#667eea,#764ba2);
        }

        .container{
            width:350px;
            background:white;
            padding:30px;
            border-radius:15px;
            box-shadow:0 10px 25px rgba(0,0,0,0.2);
        }

        h2{
            text-align:center;
            margin-bottom:20px;
            color:#333;
        }

        input{
            width:100%;
            padding:12px;
            margin:10px 0;
            border:1px solid #ccc;
            border-radius:8px;
            font-size:16px;
        }

        button{
            width:100%;
            padding:12px;
            border:none;
            border-radius:8px;
            background:#667eea;
            color:white;
            font-size:16px;
            cursor:pointer;
            margin-top:10px;
        }

        button:hover{
            background:#5a67d8;
        }

        .message{
            text-align:center;
            margin-top:15px;
            font-size:14px;
        }
    </style>
</head>
<body>

    <div class="container">

        <h2>Reset Password</h2>

        <input type="password" id="password" placeholder="Enter New Password">

        <button onclick="resetPassword()">Reset Password</button>

        <div class="message" id="message"></div>

    </div>

    <script>
        window.addEventListener('DOMContentLoaded', function () {
            const email = localStorage.getItem('resetEmail');
            if (!email) {
                document.getElementById('message').innerText = 'Reset session expired. Please start again from Forgot Password.';
            }
        });

        async function resetPassword() {
            const email = localStorage.getItem("resetEmail");
            const newPassword = document.getElementById("password").value.trim();

            if (!email) {
                document.getElementById("message").innerText = "Please start the reset flow again.";
                return;
            }

            if (!newPassword) {
                document.getElementById("message").innerText = "Please enter a new password.";
                return;
            }

            try {
                const response = await fetch("http://localhost:5000/api/auth/reset-password", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ email, newPassword })
                });

                const data = await response.json();
                document.getElementById("message").innerText = data.message;

                if (response.ok) {
                    localStorage.removeItem("resetEmail");
                    setTimeout(() => {
                        window.location.href = "signin.html";
                    }, 1500);
                }
            } catch (error) {
                console.error(error);
                document.getElementById("message").innerText = "Network error. Please try again.";
            }
        }
    </script>

</body>
</html>
